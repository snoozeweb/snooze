version: 2
project_name: snooze

# No `before` hooks: `go mod tidy` would mutate go.mod mid-release and trip
# GoReleaser's dirty-tree check. go.sum is committed, so the build is
# self-contained without it.

builds:
  - id: snooze-server
    main: ./cmd/snooze-server
    binary: snooze-server
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: ["-trimpath", "-tags=osusergo,netgo"]
    ldflags:
      - -s -w
      - -X github.com/snoozeweb/snooze/internal/version.Version={{.Version}}
      - -X github.com/snoozeweb/snooze/internal/version.Commit={{.Commit}}
      - -X github.com/snoozeweb/snooze/internal/version.Date={{.Date}}
  - id: snooze
