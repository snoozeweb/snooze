# One tar.gz per binary per platform. Per-binary (rather than a single grouped
# archive) keeps the {{ .Binary }} naming and avoids the "different binary count
# per platform" error: snooze-server/snooze ship linux+darwin while the
# auxiliary daemons are linux-only.
archives:
  - id: snooze-server
    ids: [snooze-server]
    formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: snooze
    ids: [snooze]
    formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: snooze-syslog
    ids: [snooze-syslog]
    formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: snooze-snmptrap
