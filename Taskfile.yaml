---
# Root Taskfile for the Go rewrite. Components and the Helm chart
# carry their own Taskfiles and are included below.

version: '3'

dotenv:
- .env.local

vars:
  REPO: snoozeweb

includes:
  web:
    taskfile: ./web/Taskfile.yaml
    dir: ./web
  docs:
    taskfile: ./docs/Taskfile.yaml
    dir: ./docs
  chart:
    taskfile: ./packaging/helm/Taskfile.yaml
    dir: ./packaging/helm

tasks:

  default:
    desc: List available tasks
    cmds:
    - task --list

  # ---------- Go ----------

  go:lint:
    desc: Lint the Go codebase (golangci-lint)
    cmds:
    - golangci-lint run ./...

  go:vet:
    desc: Run `go vet` over every package
    cmds:
    - go vet ./...

  go:test:
    desc: Run Go unit tests (race detector on, shuffled, fresh cache)
    cmds:
    - go test -race -shuffle=on -count=1 ./...

  go:test-short:
    desc: Run the short test subset (skips the slow integration paths)
    cmds:
    - go test -short -race -count=1 ./...

  go:test:e2e:
    desc: |
      Run the env-gated end-to-end integration tests for the input/output
      integrations. Each test self-skips unless its SNOOZE_E2E_* credentials
      are exported (see each integration's docs page under
      docs/content/general/integrations/ for the required variables).
    cmds:
    - go test -run E2E -count=1 ./...

  go:build:
    desc: Build every Go binary under cmd/ into ./bin/
    cmds:
    - mkdir -p bin
    - |
      for d in cmd/*/; do
        bin=$(basename "$d")
        echo "==> building $bin"
        go build -trimpath -tags 'osusergo,netgo' -o bin/"$bin" ./"$d"
      done

  go:tidy:
    desc: Sync go.mod / go.sum
    cmds:
    - go mod tidy

  go:vuln:
    desc: Scan dependencies for known vulnerabilities (govulncheck)
    cmds:
    - govulncheck ./...

  # ---------- Release ----------

  goreleaser:check:
    desc: Validate .goreleaser.yaml without building anything
    cmds:
    - goreleaser check

  goreleaser:snapshot:
    desc: Build a snapshot release locally (no publish)
    cmds:
    - goreleaser release --snapshot --clean

  # ---------- Docker (per-binary) ----------

  docker:build:
    desc: |
      Build a Go binary image with packaging/Dockerfile.golang.
      Pass BINARY=snooze-X (required). The `snooze-server` binary
      uses the `runtime-server` target (carries the React/Vite bundle);
      every other binary uses `runtime-component`.
      Optional: TAG=dev, VERSION=0.0.0-dev.
    vars:
      BINARY: '{{ .BINARY | default "" }}'
      TAG: '{{ .TAG | default "dev" }}'
      VERSION: '{{ .VERSION | default "0.0.0-dev" }}'
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
      TARGET: '{{ if eq .BINARY "snooze-server" }}runtime-server{{ else }}runtime-component{{ end }}'
      IMAGE: '{{ if eq .BINARY "snooze-server" }}snooze{{ else }}{{ .BINARY }}{{ end }}'
    cmds:
    - |
      docker build \
        -f packaging/Dockerfile.golang \
        --target {{ .TARGET }} \
        --build-arg BINARY={{ .BINARY }} \
        --build-arg VERSION={{ .VERSION }} \
        --build-arg COMMIT={{ .COMMIT }} \
        --build-arg BUILD_TIME={{ .BUILD_TIME }} \
        -t {{ .REPO }}/{{ .IMAGE }}:{{ .TAG }} \
        .
    preconditions:
    - sh: test -n "{{ .BINARY }}"
      msg: "BINARY is required (e.g. BINARY=snooze-server)"
    - sh: test -d cmd/{{ .BINARY }}
      msg: "cmd/{{ .BINARY }} does not exist"

  # ---------- Render (try.snoozeweb.net) ----------

  render:deploy:
    desc: |
      Build snoozeweb/snooze, push to Docker Hub, redeploy try.snoozeweb.net
      and wait until the service reports `live`. Requires RENDER_API_KEY in
      the environment. Pass TAG=x.y.z to override the default image tag.
      See scripts/render-deploy.sh for the full set of knobs (SKIP_BUILD,
      SKIP_PUSH, RENDER_SERVICE_ID, IMAGE_REPO, …).
    vars:
      TAG: '{{ .TAG | default "2.2.0" }}'
    cmds:
    - scripts/render-deploy.sh {{ .TAG }}
    preconditions:
    - sh: test -n "$RENDER_API_KEY"
      msg: "RENDER_API_KEY env var is required"
