---
name: 'cloudwatch'
desc: 'Receive Amazon CloudWatch alarm notifications via Amazon SNS HTTP(S) delivery'

# Webhook receivers are unauthenticated by design — SNS pushes alerts without
# credentials. `write: [any]` grants every authenticated caller write access
# too (because the authorizer adds `any` to the user's permission set), so
# this plugin is effectively public on both axes.
# Mirrors the alertmanager / grafana policy.
route_defaults:
    authentication: false
    authorization_policy:
        write: [any]
