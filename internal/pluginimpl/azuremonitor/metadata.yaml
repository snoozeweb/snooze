---
name: 'azuremonitor'
desc: 'Receive Azure Monitor alert webhook notifications (Common Alert Schema)'

# Webhook receivers are unauthenticated by design — Azure Monitor Action Groups
# push alerts without credentials. `write: [any]` grants every authenticated
# caller write access too (because the authorizer adds `any` to the user's
# permission set), so this plugin is effectively public on both axes.
# Mirrors the alertmanager / grafana / influxdb2 policy.
route_defaults:
    authentication: false
    authorization_policy:
        write: [any]
