---
name: 'Call a webhook'
desc: 'HTTP request to an arbitrary URL'
icon: 'link'
category: 'generic'
doc_url: 'https://snoozeweb.github.io/snooze/general/integrations/webhook'
provides:
    - notifier
# Field order mirrors origin/master's Python plugin (url → payload-stuff →
# proxy → ssl_verify → inject_response), with the Go-port additions (method,
# headers, auth, timeout, batch knobs) slotted in alongside their semantic
# neighbours.
action_form:
    url:
        display_name: URL
        component: String
        description: 'URL to send the request to (Go text/template over .Record)'
        required: true
    method:
        display_name: Method
        component: Selector
        description: 'HTTP method'
        default_value: 'POST'
        options:
            - {text: POST, value: POST}
            - {text: GET, value: GET}
            - {text: PUT, value: PUT}
            - {text: PATCH, value: PATCH}
            - {text: DELETE, value: DELETE}
            - {text: HEAD, value: HEAD}
            - {text: OPTIONS, value: OPTIONS}
    headers:
        display_name: Headers
        component: Arguments
        description: 'List of HTTP headers; values may be Go text/templates over .Record'
        placeholder:
            - header_name
            - header_value
    body:
        display_name: Body
        component: Text
        description: 'Request body (Go text/template over .Record). Defaults to a JSON-encoded record.'
    proxy:
        display_name: Proxy URI
        component: String
        description: 'Send the request through a proxy server (e.g. http://proxy.local:3128)'
    tls_insecure:
        display_name: TLS Insecure
        component: Switch
        default_value: false
        description: 'Skip TLS certificate verification when calling HTTPS endpoints'
    inject_response:
        display_name: Inject Response
        component: Switch
        default_value: false
        description: 'Inject the HTTP response into the record as response_<action_name> (parsed as JSON when possible)'
    auth:
        display_name: Authentication
        component: Object
        description: 'Optional auth: {type: bearer|basic, token|username|password}'
    timeout:
        display_name: Timeout
        component: String
        description: 'Request timeout as a Go duration (default 10s)'
        default_value: '10s'
    batch:
        display_name: Batch
        component: Switch
        default_value: false
        description: >-
            Accumulate rendered JSON bodies and POST them together as a single
            array. Only effective when the rendered body is valid JSON. Ignored
            when Inject Response is on.
    batch_maxsize:
        display_name: Batch max size
        component: Number
        default_value: 100
        description: 'Flush the batch when it reaches this many records'
    batch_timer:
        display_name: Batch timer (seconds)
        component: Number
        default_value: 10
        description: 'Flush the batch when it is at least this old'
