---
name: 'newrelic'
desc: 'Receive New Relic Alerts webhook notifications (workflow and legacy condition shapes)'

# Webhook receivers are unauthenticated by design — New Relic pushes alerts
# without credentials. `write: [any]` grants every authenticated caller write
# access too (because the authorizer adds `any` to the user's permission set),
# so this plugin is effectively public on both axes.
# Mirrors the alertmanager / grafana / influxdb2 policy.
route_defaults:
    authentication: false
    authorization_policy:
        write: [any]
