---
# -- Timezone to use for all components
timeZone: ""

database:
  # -- Which database to provision and point snooze-server at.
  # Allowed values: ``mongo`` | ``postgres`` | ``sqlite``.
  #
  # * ``mongo`` (default) provisions a MongoDBCommunity replica set
  #   via the community operator. Backwards-compatible with prior
  #   Python deployments.
  # * ``postgres`` provisions a CloudNativePG ``Cluster``. The CNPG
  #   operator must be installed in the cluster.
  # * ``sqlite`` skips any external database and switches the server
  #   to a single-replica StatefulSet that owns an on-disk SQLite
  #   file at ``/var/lib/snooze/db.sqlite``. Intended for small
  #   single-tenant installs and dev/test clusters.
  kind: mongo

  # MongoDB driver tunables (only consulted when ``kind: mongo``).
  mongo:
    # -- Database name for the snooze user. Must match the
    # ``users[].db`` entry in ``templates/mongodb/mongodb.yaml``.
    database: snooze

  # Postgres driver tunables (only consulted when ``kind: postgres``).
  # All connection details flow through the ``<release>-postgres-app``
  # secret provisioned by CloudNativePG; this block only carries pool
  # sizing knobs that the server reads from its own config.
  postgres:
    # -- Minimum size of the pgx connection pool.
    poolMinSize: 2
    # -- Maximum size of the pgx connection pool.
    poolMaxSize: 10

  # SQLite driver tunables (only consulted when ``kind: sqlite``).
  sqlite:
    # -- On-disk path for the SQLite database. Must live under the
    # persistent volume mounted into the StatefulSet
    # (see ``server.sqlite.persistentVolume``).
    path: /var/lib/snooze/db.sqlite

server:
  # -- Number of replicas of snooze-server to run. Ignored when
  # ``database.kind`` is ``sqlite`` — the StatefulSet always runs a
  # single replica because SQLite is single-writer.
  replicaCount: 3
  image:
    # -- The image to use for snooze-server
    repository: ghcr.io/japannext/snooze-server
    # -- A tag override for snooze-server
    tag: ""
    # -- Image pull policy of snooze-server
    pullPolicy: IfNotPresent

  podMonitor:
    # -- Enable the monitoring via prometheus
    enabled: false
    # @schema
    # additionalProperties: {type: string}
    # @schema
    extraLabels: {}

  config:
    defaultAuthBackend: ldap

  # SQLite-specific deployment knobs. Only consulted when
  # ``database.kind`` is ``sqlite``.
  sqlite:
    persistentVolume:
      # -- Size of the PersistentVolumeClaim that backs
      # ``/var/lib/snooze`` in the StatefulSet. SQLite is single-file
      # so 5Gi is plenty for typical deployments.
      size: 5Gi
      # -- StorageClass for the PVC. Leave empty to use the cluster
      # default StorageClass.
      storageClassName: ""

  ldap:
    # -- Enable LDAP authentication configuration
    enabled: false
    # -- The LDAP host to contact
    host: ""
    port: 636
    baseDN: ""
    # -- The bindDN to use for LDAP authentication
    bindDN: ""
    # -- Name of the secret containing the bind password
    bindPasswordExistingSecretName: ""
    # -- The key in the secret containing the bind password
    bindPasswordExistingSecretKey: "password"
    # -- The LDAP user filter for LDAP authentication
    userFilter: '(sAMAccountName=%s)'
    displayNameAttribute: 'cn'
    emailAttribute: 'mail'
    groupDN: ''
    memberAttribute: 'memberOf'

ingress:
  # -- Ingress class name
  className: nginx
  # -- The host to use for ingress
  host: ""
  certManager:
    # -- Whether cert-manager will be used for ingress certificate
    enabled: false
    # -- The kind of cert-manager issuer
    issuerKind: ClusterIssuer
    # -- The name of the cert-manager issuer
    issuerName: ""

syslog:
  # -- When enabled, deploy snooze-syslog inputs
  enabled: true
  # -- Number of snooze-syslog replicas
  replicaCount: 2
  image:
    # -- The image to use for snooze-syslog
    repository: ghcr.io/japannext/snooze-syslog
    # -- A tag override for snooze-syslog
    tag: ""
    # -- Image pull policy of snooze-syslog
    pullPolicy: IfNotPresent
  # -- Number of workers per instance
  workers: 4
  # -- Enable debug logs
  debug: false

snmptrap:
  # -- When enabled, deploy snooze-snmptrap inputs
  enabled: true
  # -- Number of snooze-snmptrap replicas
  replicaCount: 2
  image:
    # -- The image to use for snooze-snmptrap
    repository: ghcr.io/japannext/snooze-snmptrap
    # -- A tag override for snooze-snmptrap
    tag: ""
    # -- Image pull policy of snooze-snmptrap
    pullPolicy: IfNotPresent
  sendWorkers: 4

relp:
  # -- When enabled, deploy snooze-relp inputs
  enabled: false
  # -- Number of snooze-relp replicas
  replicaCount: 2
  image:
    # -- The image to use for snooze-relp
    repository: ghcr.io/japannext/snooze-relp
    # -- A tag override for snooze-relp
    tag: ""
    # -- Image pull policy of snooze-relp
    pullPolicy: IfNotPresent

smtp:
  # -- When enabled, deploy snooze-smtp inputs
  enabled: false
  # -- Number of snooze-smtp replicas
  replicaCount: 2
  image:
    # -- The image to use for snooze-smtp
    repository: ghcr.io/japannext/snooze-smtp
    # -- A tag override for snooze-smtp
    tag: ""
    # -- Image pull policy of snooze-smtp
    pullPolicy: IfNotPresent

pacemaker:
  # -- Container image config for the snooze-pacemaker one-shot helper.
  # The helper is invoked by stonith-ng on cluster nodes, not deployed
  # as a workload; this block exists so the image ref is publishable
  # from the same chart values.
  image:
    # -- The image to use for snooze-pacemaker
    repository: ghcr.io/japannext/snooze-pacemaker
    # -- A tag override for snooze-pacemaker
    tag: ""
    # -- Image pull policy of snooze-pacemaker
    pullPolicy: IfNotPresent

teams:
  # -- When enabled, deploy snooze-teams notification plugin
  enabled: false
  # -- Number of snooze-teams replicas
  replicaCount: 2
  image:
    # -- The image to use for snooze-teams
    repository: ghcr.io/japannext/snooze-teams
    # -- A tag override for snooze-teams
    tag: ""
    # -- Image pull policy of snooze-teams
    pullPolicy: IfNotPresent

mattermost:
  # -- When enabled, deploy snooze-mattermost notification plugin
  enabled: false
  # -- Number of snooze-mattermost replicas
  replicaCount: 2
  image:
    # -- The image to use for snooze-mattermost
    repository: ghcr.io/japannext/snooze-mattermost
    # -- A tag override for snooze-mattermost
    tag: ""
    # -- Image pull policy of snooze-mattermost
    pullPolicy: IfNotPresent

googlechat:
  # -- When enabled, deploy snooze-googlechat notification plugin
  enabled: false
  # Number of snooze-googlechat replicas
  replicaCount: 2
  image:
    # -- The image to use for snooze-googlechat
    repository: ghcr.io/japannext/snooze-googlechat
    # -- A tag override for snooze-googlechat
    tag: ""
    # -- Image pull policy of snooze-googlechat
    pullPolicy: IfNotPresent
  botName: "Snooze"
  subscriptionName: ""
  existingSaSecretName: ""
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""

# Image config for the snooze CLI client (used inside cluster jobs, e.g.
# bootstrap / migrations). No workload is rendered from this block.
client:
  image:
    # -- The image to use for the snooze CLI client
    repository: ghcr.io/japannext/snooze
    # -- A tag override for snooze
    tag: ""
    # -- Image pull policy of snooze
    pullPolicy: IfNotPresent

mongodb:
  storageClassName: ""

postgres:
  # -- Number of CloudNativePG cluster instances (1 = single-instance).
  instances: 3
  # -- Postgres major version to deploy.
  imageName: "ghcr.io/cloudnative-pg/postgresql:16"
  # -- StorageClass used for the PGDATA persistent volume claim.
  storageClassName: ""
  # -- Persistent volume size for each instance.
  storageSize: 10Gi
