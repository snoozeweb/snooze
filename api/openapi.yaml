openapi: 3.1.0
info:
  title: Snooze API
  version: 2.0.0
  summary: Log aggregation and alerting REST API.
  description: |
    The Snooze v1 HTTP API. Snooze 2.0 is a Go rewrite of the Python 1.x
    server; this document describes the **v1** wire contract that ships
    with 2.0.

    ## Authentication

    Every endpoint outside the small "public" set (`/healthz`,
    `/readyz`, `/metrics`, `/api/v1/login/*`) requires a bearer JWT:

    ```
    Authorization: Bearer <token>
    ```

    Tokens are obtained via `POST /api/v1/login/{local,ldap,anonymous}`.
    The Python 1.x `Authorization: JWT <token>` scheme is no longer
    accepted.

    ## Multi-tenancy

    Snooze supports multiple isolated organizations (tenants) on a single
    server. Every authenticated request is scoped to the tenant encoded in
    the `tenant_id` JWT claim. Pass the `org` field in the login request
    body to obtain a token scoped to a specific tenant; omit `org` (or leave
    it blank) to land in the `default` tenant.

    **Ingest routing** — unauthenticated alert ingestion (`POST /api/v1/alerts`,
    `POST /api/v1/webhook/*`) is routed to a tenant by the `Authorization:
    Bearer <ingest_token>` header, where `<ingest_token>` is the per-tenant
    opaque token stored in the tenant document. When no token is supplied or
    the token is unknown, the request falls back to the `default` tenant.

    **Platform permissions** — the `ro_tenant` and `rw_tenant` permissions gate
    the `/api/v1/tenant` registry endpoints. These are platform-tier permissions,
    independent of any tenant. The seeded `platform_admin` role holds both.

    ## CRUD shape

    Most plugins expose the same six verbs under
    `/api/v1/{plugin}`:

    * `GET    /api/v1/{plugin}` — list (paginated).
    * `POST   /api/v1/{plugin}` — create.
    * `DELETE /api/v1/{plugin}` — bulk delete by query.
    * `POST   /api/v1/{plugin}/search` — search with a JSON body.
    * `GET    /api/v1/{plugin}/{uid}` — fetch one.
    * `PUT    /api/v1/{plugin}/{uid}` — full replace.
    * `PATCH  /api/v1/{plugin}/{uid}` — partial update.
    * `DELETE /api/v1/{plugin}/{uid}` — delete one.

    A number of plugins (`alertmanager`, `azuremonitor`, `cloudwatch`,
    `datadog`, `grafana`, `influxdb2`, `kapacitor`, `newrelic`,
    `prometheus`, `sentry`) replace the generic CRUD with an inbound
    webhook surface under `/api/v1/webhook/{name}`; the `heartbeat`
    plugin exposes a token-gated ping at `/api/v1/webhook/heartbeat`.

    ## Conditions (the `q` parameter)

    `q` is a base64url-encoded JSON document describing a condition.
    The grammar is the same AST the Python `Condition` model used:

    ```json
    {"type": "AND", "args": [
       {"type": "EQUALS", "field": "host", "value": "srv-1"},
       {"type": "MATCHES", "field": "message", "value": "^ERROR"}
    ]}
    ```

    `POST /api/v1/{plugin}/search` accepts the same shape as a JSON
    body field (`condition`) so clients can avoid URL-length limits.

  contact:
    name: Snooze maintainers
    url: https://github.com/snoozeweb/snooze/issues
  license:
    name: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.txt

servers:
  - url: https://snooze.example.com
    description: Production deployment (path prefix optional)
  - url: http://localhost:5200
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: health
    description: Liveness and readiness probes.
  - name: auth
    description: Login + token issuance.
  - name: telemetry
    description: Metrics and tracing endpoints.
  - name: alerts
    description: Alert ingestion (POST /api/v1/alerts).
  - name: webhooks
    description: Inbound webhook receivers for foreign monitoring sources.
  - name: crud
    description: Generic per-plugin REST CRUD surface.
  - name: schema
    description: JSON Schema discovery + permission enumeration.
  - name: platform
    description: Platform-level tenant registry CRUD (requires ro_tenant / rw_tenant).

paths:

  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      description: |
        Returns 200 as long as the process is up. Used by Kubernetes
        liveness probes and Docker healthchecks. Always public.
      security: []
      responses:
        '200':
          description: Process alive.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/StatusOK'}

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      description: |
        Polls the database driver with a 2s timeout. Used by
        Kubernetes readiness probes. Always public.
      security: []
      responses:
        '200':
          description: Server ready.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/StatusOK'}
        '503':
          description: Database unreachable.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/health:
    get:
      tags: [health]
      summary: Verbose health check
      description: |
        Per-subsystem status: database, registered plugins, optional
        syncer cluster view.
      security: []
      responses:
        '200':
          description: Health snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  subsystems:
                    type: object
                    additionalProperties:
                      type: string
                  plugins:
                    type: array
                    items: {type: string}

  /metrics:
    get:
      tags: [telemetry]
      summary: Prometheus metrics
      description: |
        Prometheus text-format exposition. Backed by the
        `prometheus.Registry` constructed at startup. Always public.
      security: []
      responses:
        '200':
          description: Metrics payload.
          content:
            text/plain:
              schema:
                type: string

  /api/v1/login:
    get:
      tags: [auth]
      summary: List enabled authentication backends
      description: |
        Returns the names of registered authentication providers, with
        the configured `general.default_auth_backend` first.
      security: []
      responses:
        '200':
          description: Backend list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      backends:
                        type: array
                        items: {type: string}

  /api/v1/login/local:
    post:
      tags: [auth]
      summary: Local user login (bcrypt-hashed password)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LoginRequest'}
      responses:
        '200':
          description: Bearer JWT.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LoginResponse'}
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/login/ldap:
    post:
      tags: [auth]
      summary: LDAP login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LoginRequest'}
      responses:
        '200':
          description: Bearer JWT.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LoginResponse'}
        '401':
          description: LDAP bind / search failed.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}
        '409':
          description: Backend disabled.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/login/anonymous:
    post:
      tags: [auth]
      summary: Anonymous login
      description: |
        Issues a bearer JWT with the `anonymous` method, used when
        `general.anonymous_enabled: true`. No request body.
      security: []
      responses:
        '200':
          description: Anonymous bearer JWT.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LoginResponse'}
        '404':
          description: Anonymous backend not registered.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/login/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a new access+refresh pair
      description: |
        Validates the supplied refresh token, revokes it, and issues a
        fresh access token alongside a rotated refresh token. The caller
        must replace its stored pair with the new one — the previous
        refresh token is no longer valid. An invalid, expired, revoked
        or unknown token returns 401 with a generic message.

        Roles and permissions are re-resolved on every refresh so an
        admin's revocation of a permission takes effect within the
        access-token lease (default 1 hour).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RefreshRequest'}
      responses:
        '200':
          description: New access + refresh pair.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LoginResponse'}
        '401':
          description: Invalid, expired, revoked or unknown refresh token.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/login/logout:
    post:
      tags: [auth]
      summary: Revoke a refresh token
      description: |
        Best-effort revocation of the supplied refresh token. Unknown or
        already-revoked tokens are treated as no-ops — the endpoint
        always returns 204 so a client cleaning up state never sees a
        500. The access token (Bearer JWT) is not revoked: it continues
        to be valid until its own expiry. Clients should drop both
        tokens client-side after calling this endpoint.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RefreshRequest'}
      responses:
        '204':
          description: Logout acknowledged (idempotent).

  /api/v1/user/me/password:
    post:
      tags: [auth]
      summary: Self-service password change
      description: |
        Replaces the authenticated user's password. Only available when
        the caller's JWT `method` claim is `local` — LDAP / anonymous
        accounts are managed by their backing provider.

        The caller MUST supply their current password; the server
        re-runs the bcrypt comparison through the same code path as
        `/api/v1/login/local`, so the failure mode (and timing) is
        identical to a bad-credentials login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, password]
              properties:
                current_password:
                  type: string
                  description: The caller's current password.
                password:
                  type: string
                  description: The new password (bcrypt-hashed server-side).
      responses:
        '204':
          description: Password updated.
        '401':
          description: Missing claims or wrong current password.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}
        '403':
          description: |
            Caller's auth method is not `local`; self-service password
            change is not available for that backend.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}
        '422':
          description: Empty body field(s).
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/action/test:
    post:
      tags: [crud]
      summary: Send a test notification for an action config
      description: |
        Delivers a single synthetic alert through the notifier named by
        `selected`, using `subcontent` as its action_form configuration. The
        config does NOT need to be persisted first — this powers the
        "Send test" button in the Actions editor. The notifier's real Send
        path runs, so a 200 proves end-to-end delivery (URL, auth, payload).
        No record is mutated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [selected]
              properties:
                selected:
                  type: string
                  description: Notifier plugin registry key (teams, slack, webhook, …).
                subcontent:
                  type: object
                  additionalProperties: true
                  description: The action_form values for that notifier.
      responses:
        '200':
          description: Test notification delivered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: {type: boolean}
        '404':
          description: Unknown plugin.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}
        '422':
          description: Plugin is not a notifier, or upstream delivery failed.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/alerts:
    post:
      tags: [alerts]
      summary: Submit one or many alert records
      description: |
        Accepts a single record object or an array of records. Each
        record is run through the configured `core.process_plugins`
        pipeline; the response includes the post-pipeline records and
        any per-record processing errors.

        **Multi-tenant routing** — in a multi-tenant deployment, supply
        `Authorization: Bearer <ingest_token>` (the per-tenant opaque token
        from `GET /api/v1/tenant/{id}`) to route ingestion to a specific
        tenant. When no token is present or the token is unknown, the request
        falls back to the `default` tenant. Single-tenant deployments need no
        token (existing behaviour preserved).
      security:
        - {}
        - ingestToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - {$ref: '#/components/schemas/Record'}
                - type: array
                  items: {$ref: '#/components/schemas/Record'}
      responses:
        '200':
          description: Per-record processing result.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/Record'}
                  errors:
                    type: array
                    items: {type: string}

  /api/v1/cluster/status:
    get:
      tags: [health]
      summary: Cluster + plugin status
      description: |
        Cluster member list (graded ok/degraded/down from the `nodes`
        heartbeat collection; leader = alphabetically-first ok member — Snooze
        has no real leader election) plus the loaded-plugin roster. Falls back
        to a synthetic `standalone` member on a single-node deploy. Backs the
        admin Status page.
      responses:
        '200':
          description: Cluster status snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cluster:
                    type: object
                    properties:
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            name: {type: string}
                            status: {type: string, enum: [ok, degraded, down]}
                      leader: {type: string}
                  plugins:
                    type: array
                    items:
                      type: object
                      properties:
                        name: {type: string}
                        loaded: {type: boolean}

  /api/v1/condition/parse:
    post:
      tags: [crud]
      summary: Parse a search-bar query string into a Condition AST
      description: |
        Always returns 200 (even on a query parse error) so the SearchBar can
        render an inline marker. A 400 is returned only when the JSON envelope
        itself is malformed. Exactly one of `condition` / `error` is set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: {type: string}
      responses:
        '200':
          description: Parse result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  condition: {type: object, additionalProperties: true}
                  error:
                    type: object
                    properties:
                      pos: {type: integer}
                      token: {type: string}
                      message: {type: string}

  /api/v1/condition/fields:
    get:
      tags: [crud]
      summary: Field catalog for SearchBar autocomplete
      parameters:
        - name: collection
          in: query
          required: false
          schema: {type: string, default: record}
      responses:
        '200':
          description: Field catalog (empty array for unknown collections).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name: {type: string}
                        type: {type: string}
                        description: {type: string}
                        values: {type: array, items: {type: string}}

  /api/v1/snooze/{uid}/retro_apply:
    post:
      tags: [crud]
      summary: Replay a stored snooze against existing records
      description: |
        Applies the snooze's condition to the `record` collection: deletes
        matches when `discard` is true, otherwise tags them `snoozed:<name>`.
        Requires the `rw_record` permission.
      parameters:
        - name: uid
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Retro-apply counts.
          content:
            application/json:
              schema:
                type: object
                required: [matched, snooze]
                properties:
                  matched: {type: integer}
                  deleted: {type: integer}
                  tagged: {type: integer}
                  snooze: {type: string}
        '404':
          description: Snooze not found.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/tenant:
    get:
      tags: [platform]
      summary: List tenants
      description: |
        Returns all tenant records. Requires `ro_tenant` or `rw_tenant`.
        Evaluated against platform scope, not any individual tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: offset
          in: query
          schema: {type: integer, default: 0}
        - name: limit
          in: query
          schema: {type: integer, default: 20}
        - name: orderby
          in: query
          schema: {type: string}
        - name: asc
          in: query
          schema: {type: boolean, default: true}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
                  meta:
                    $ref: '#/components/schemas/ListMeta'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      tags: [platform]
      summary: Create tenant
      description: |
        Creates a new organization and seeds its default roles (`admin`,
        `viewer`, `notifications`). Requires `rw_tenant`. The `id` slug must be
        unique and must not be `default`. If `ingest_token` is omitted a random
        token is generated and returned in the response — this is the only
        opportunity to retrieve it.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantCreateResponse'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}

  /api/v1/tenant/{id}/admin:
    post:
      tags: [platform]
      summary: Ensure/reset a tenant's local admin password
      description: |
        Provisions or resets the local admin for the given tenant. If the
        user identified by `username` (default "admin") already exists its
        password is rotated; otherwise a new local user is created with the
        `admin` role. Requires `rw_tenant`. The returned `password` is shown
        exactly once — store it immediately.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
          description: "Tenant slug."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: "Admin username to provision or reset (default \"admin\")."
      responses:
        '200':
          description: Admin credential (password shown once).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCredential'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  /api/v1/tenant/{id}:
    get:
      tags: [platform]
      summary: Get tenant by id
      description: Requires `ro_tenant` or `rw_tenant`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    patch:
      tags: [platform]
      summary: Update tenant display_name / status / ingest_token
      description: Requires `rw_tenant`. `id` is immutable.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [platform]
      summary: Delete tenant
      description: |
        Requires `rw_tenant`. The reserved "default" tenant cannot be deleted
        (server returns 409).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      responses:
        '204':
          description: Deleted
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /api/v1/webhook/{webhook}:
    post:
      tags: [webhooks]
      summary: Inbound webhook receiver
      description: |
        Convert a foreign monitoring source's alert payload into one or
        more Snooze records and submit them to the pipeline. The
        payload schema is source-specific; see each integration's
        documentation for the wire format.

        Receivers are unauthenticated by default. When `ingest.token` is
        configured every request must carry it as
        `Authorization: Bearer <token>` or `?token=<token>`.

        **Multi-tenant routing** — supply a per-tenant `ingest_token` (from
        `GET /api/v1/tenant/{id}`) to route webhook payloads to a specific
        tenant. Falls back to `default` when absent or unknown. The global
        `ingest.token` guard (if configured) is evaluated first.
      security:
        - {}
        - ingestToken: []
      parameters:
        - name: webhook
          in: path
          required: true
          schema:
            type: string
            enum:
              - alertmanager
              - azuremonitor
              - cloudwatch
              - datadog
              - grafana
              - influxdb2
              - kapacitor
              - newrelic
              - prometheus
              - sentry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Records accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/Record'}

  /api/v1/webhook/heartbeat:
    post:
      tags: [webhooks]
      summary: Heartbeat ping (dead-man's-switch)
      description: |
        Keep a heartbeat alive: stamps the named heartbeat's `last_seen`
        to now. Public, but each ping must present the heartbeat's
        server-generated per-record token (a configured `ingest.token`
        applies on top). `GET` is also accepted.
      security: []
      parameters:
        - name: name
          in: query
          required: true
          schema: {type: string}
          description: The heartbeat name.
        - name: token
          in: query
          required: true
          schema: {type: string}
          description: The heartbeat's server-generated secret token.
      responses:
        '200':
          description: Heartbeat stamped.
        '401':
          description: Missing or invalid token.
        '404':
          description: No heartbeat with that name.

  /api/v1/permissions:
    get:
      tags: [schema]
      summary: List every permission string contributed by plugins
      description: |
        Returns the sorted union of `metadata.provides` from every
        registered plugin, plus the canonical `rw_all` / `ro_all`
        wildcards and a per-plugin `{rw,ro}_<name>` pair.
      responses:
        '200':
          description: Permission list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: {type: string}

  /api/v1/schema/{plugin}:
    get:
      tags: [schema]
      summary: Fetch the JSON Schema attached to a DataModel plugin
      parameters:
        - {$ref: '#/components/parameters/PluginPath'}
      responses:
        '200':
          description: JSON Schema document.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '404':
          description: Plugin has no schema.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/metadata:
    get:
      tags: [schema]
      summary: List every registered plugin's metadata
      description: |
        Returns the parsed `metadata.yaml` of every registered plugin
        (name / display_name / icon / action_form / widgets / etc.).
        The React frontend uses this to render plugin-defined typed
        forms — e.g. the Action sub-types (Mail, Webhook, Patlite) —
        instead of free-form JSON textareas.

        Plugins are sorted by name so the payload is deterministic.
      responses:
        '200':
          description: Plugin metadata list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/Metadata'}

  /api/v1/metadata/{plugin}:
    get:
      tags: [schema]
      summary: Fetch a single plugin's metadata
      parameters:
        - {$ref: '#/components/parameters/PluginPath'}
      responses:
        '200':
          description: Plugin metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: {$ref: '#/components/schemas/Metadata'}
        '404':
          description: Plugin not registered.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/stats:
    get:
      tags: [crud]
      summary: Dashboard aggregate statistics
      description: |
        Returns time-series counters, per-dimension totals, a live record
        snapshot and a weekday distribution for the requested time window.
        `from` and `to` are RFC3339 timestamps (or Unix epoch seconds);
        `bucket` is the series resolution in seconds (default 3600).
      parameters:
        - name: from
          in: query
          required: true
          schema: {type: string}
          description: Window start — RFC3339 or Unix epoch seconds.
        - name: to
          in: query
          required: true
          schema: {type: string}
          description: Window end — RFC3339 or Unix epoch seconds.
        - name: bucket
          in: query
          required: false
          schema: {type: integer, default: 3600}
          description: Series bucket size in seconds.
      responses:
        '200':
          description: Aggregated statistics.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/StatsResponse'}
        '400':
          description: Bad `from` or `to` parameter.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}

  /api/v1/{plugin}:
    parameters:
      - {$ref: '#/components/parameters/PluginPath'}
    get:
      tags: [crud]
      summary: List documents in a plugin's collection
      description: |
        The `q` query parameter is a base64url-encoded JSON condition.
        Default sort is by insertion order; pass `orderby` + `asc` to
        change it.
      parameters:
        - {$ref: '#/components/parameters/QueryQ'}
        - {$ref: '#/components/parameters/Offset'}
        - {$ref: '#/components/parameters/Limit'}
        - {$ref: '#/components/parameters/OrderBy'}
        - {$ref: '#/components/parameters/Asc'}
      responses:
        '200':
          description: Paginated list.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ListResponse'}
        '400':
          description: Malformed query.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}
    post:
      tags: [crud]
      summary: Create one or many documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  additionalProperties: true
                - type: array
                  items:
                    type: object
                    additionalProperties: true
      responses:
        '200':
          description: Created.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ListResponse'}
        '422':
          description: Schema validation failed.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}
    delete:
      tags: [crud]
      summary: Delete every document matching the query
      parameters:
        - {$ref: '#/components/parameters/QueryQ'}
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      deleted: {type: integer}

  /api/v1/{plugin}/search:
    post:
      tags: [crud]
      summary: Search with a JSON body (avoids URL-length limits)
      parameters:
        - {$ref: '#/components/parameters/PluginPath'}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                condition:
                  type: object
                  additionalProperties: true
                offset: {type: integer, default: 0}
                limit:  {type: integer, default: 20}
                orderby: {type: string}
                asc: {type: boolean, default: true}
      responses:
        '200':
          description: Paginated list.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ListResponse'}

  /api/v1/{plugin}/{uid}:
    parameters:
      - {$ref: '#/components/parameters/PluginPath'}
      - name: uid
        in: path
        required: true
        schema: {type: string}
    get:
      tags: [crud]
      summary: Fetch a single document by UID
      responses:
        '200':
          description: Document.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Not found.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrEnvelope'}
    put:
      tags: [crud]
      summary: Replace a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Replaced.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    patch:
      tags: [crud]
      summary: Partial update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    delete:
      tags: [crud]
      summary: Delete a single document
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/StatusOK'}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256 JWT. The Python 1.x `Authorization: JWT <token>` scheme
        is rejected. Obtain a token via `POST /api/v1/login/local`.

    ingestToken:
      type: http
      scheme: bearer
      description: |
        Per-tenant ingest token. Opaque random string stored in the tenant
        document (`ingest_token` field). Supply as `Authorization: Bearer
        <ingest_token>` or `?token=<ingest_token>`. When absent or unknown,
        the middleware falls back to the `default` tenant (D4). This scheme
        gates `/api/v1/alerts` and `/api/v1/webhook/*` in multi-tenant
        deployments; single-tenant deployments leave ingest open (existing
        behaviour preserved).

  parameters:
    PluginPath:
      name: plugin
      in: path
      required: true
      description: |
        Plugin / collection name. The built-in set is enumerated in
        `internal/pluginimpl/all/all.go`.
      schema:
        type: string
        enum:
          - action
          - aggregaterule
          - alertmanager
          - audit
          - azuremonitor
          - cloudwatch
          - comment
          - datadog
          - discord
          - environment
          - googlechat
          - grafana
          - heartbeat
          - influxdb2
          - kapacitor
          - kv
          - mail
          - newrelic
          - notification
          - ntfy
          - opsgenie
          - pagerduty
          - patlite
          - profile
          - prometheus
          - pushover
          - record
          - role
          - rule
          - script
          - sentry
          - servicenow
          - settings
          - slack
          - snooze
          - sns
          - stats
          - statuspage
          - telegram
          - twilio
          - user
          - webhook
          - widget
    QueryQ:
      name: q
      in: query
      required: false
      description: |
        Base64url-encoded JSON condition. Empty (or absent) selects
        every document. Use `POST /{plugin}/search` for queries that
        won't fit in a URL.
      schema:
        type: string
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 20
    OrderBy:
      name: orderby
      in: query
      required: false
      schema:
        type: string
    Asc:
      name: asc
      in: query
      required: false
      schema:
        type: boolean
        default: true

  responses:
    BadRequest:
      description: Malformed request body or parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrEnvelope'
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrEnvelope'
    Forbidden:
      description: Authenticated but lacking the required permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrEnvelope'
    Conflict:
      description: Conflict (e.g. attempt to delete a reserved resource).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrEnvelope'

  schemas:
    StatusOK:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
      example:
        status: ok

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: {type: string}
        password: {type: string, format: password}
        org:
          type: string
          description: |
            Optional tenant slug. Omitted or empty defaults to "default".
            Pass when the server hosts multiple organizations and the user
            wants to log in to a specific one (D10).

    LoginResponse:
      type: object
      required: [token, expires_at, method]
      properties:
        token:
          type: string
          description: "HS256 JWT access token. Send as `Authorization: Bearer <token>`."
        expires_at:
          type: string
          format: date-time
          description: "Absolute expiry of the access token."
        refresh_token:
          type: string
          description: |
            Opaque refresh token. Present on initial login and on every
            `/api/v1/login/refresh` response. Store securely on the client;
            POST it to `/api/v1/login/refresh` to mint a new access token
            and POST it to `/api/v1/login/logout` to revoke the session.
            Each refresh rotates the token — the previous value is revoked
            server-side and a new one is returned.
        refresh_expires_at:
          type: string
          format: date-time
          description: "Absolute expiry of the refresh token."
        method:
          type: string
          enum: [local, ldap, anonymous]
        tenant_id:
          type: string
          description: |
            Tenant slug the token is scoped to. Mirrors the `tenant_id` JWT
            claim. Empty on legacy tokens — treated as `default` by the server.

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: "The refresh token returned by a prior login or refresh."

    Tenant:
      type: object
      required: [id, display_name, status]
      description: |
        One organization (tenant). id is the immutable URL/login-safe slug
        stamped as tenant_id on every scoped document. display_name is mutable.
      properties:
        id:
          type: string
          description: "Immutable slug, used as tenant_id on all scoped documents."
        display_name:
          type: string
          description: "Human-readable label; mutable."
        status:
          type: string
          enum: [active, suspended]
          description: "'suspended' blocks login + ingest but retains data."
        ingest_token:
          type: string
          description: "Per-tenant ingest token for unauthenticated ingress (D4)."
        created_at:
          type: integer
          format: int64
        updated_at:
          type: integer
          format: int64

    Record:
      type: object
      description: |
        The canonical alert document moving through the Snooze
        pipeline. Mirrors `pkg/snoozetypes.Record`. Fields are
        permissive — plugins routinely inject extra keys that don't
        appear in this schema.
      properties:
        uid:         {type: string}
        host:        {type: string}
        source:      {type: string}
        process:     {type: string}
        severity:    {type: string}
        message:     {type: string}
        timestamp:   {type: string, format: date-time}
        date_epoch:  {type: integer, format: int64}
        ttl:         {type: integer, format: int64}
        environment: {type: string}
        tags:
          type: array
          items: {type: string}
        raw:
          type: object
          additionalProperties: true
        state:
          type: string
          enum: ['', open, ack, close, shelved]
        plugins:
          type: array
          items: {type: string}
      additionalProperties: true

    ListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        meta:
          $ref: '#/components/schemas/ListMeta'

    ListMeta:
      type: object
      required: [count, limit, offset, total]
      properties:
        count:  {type: integer}
        limit:  {type: integer}
        offset: {type: integer}
        total:  {type: integer}

    ErrEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrBody'

    ErrBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - bad_request
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - validation_error
            - unavailable
            - internal
        message: {type: string}
        details:
          type: object
          additionalProperties: true
        request_id: {type: string}

    Metadata:
      type: object
      description: |
        Parsed `metadata.yaml` for a registered plugin. Mirrors
        `plugins.Metadata` in Go. Field keys are snake_case (JSON tags
        align with the YAML keys so the frontend reads the document
        verbatim).
      required: [name, plugin_name]
      properties:
        plugin_name:
          type: string
          description: |
            Registry key (machine-readable identifier; matches `Plugin.Name()`
            on the server). Injected by the metadata HTTP handler — stable
            across plugins regardless of what their YAML `name:` field carries.
            Use this (not `name`) to match a notification action's `action.selected`.
        name: {type: string, description: "Display label taken from the plugin's YAML `name:` field (e.g. \"Send email\", \"Run a script\"). Use `plugin_name` for machine matching."}
        display_name: {type: string, description: "Human-readable label (YAML `desc`)."}
        icon: {type: string, description: "Icon glyph name."}
        default_sorting: {type: string}
        default_ordering: {type: string}
        auto_reload: {type: boolean}
        widgets:
          type: object
          additionalProperties: true
          description: "Free-form per-plugin widget descriptors."
        action_form:
          type: object
          description: "Per-field form descriptor keyed by field name."
          additionalProperties: {$ref: '#/components/schemas/FormField'}
        setting_form:
          type: object
          description: |
            Typed catalogue of runtime settings (settings plugin only). Same
            FormField shape as `action_form`; the optional `group` field on
            each entry lets the frontend render the picker grouped by section.
          additionalProperties: {$ref: '#/components/schemas/FormField'}
        provides:
          type: array
          items: {type: string}
          description: "Permission strings the plugin contributes."
        routes:
          type: object
          description: "Per-route overrides, keyed by route path."
          additionalProperties:
            type: object
            properties:
              class_name: {type: string}
              check_permissions: {type: boolean}
              primary_key:
                type: array
                items: {type: string}
              duplicate_policy: {type: string}
              authentication: {type: boolean}
        options:
          type: object
          additionalProperties: true
        search_fields:
          type: array
          items: {type: string}
        audit: {type: boolean}
        force_order: {type: integer}
        tree: {type: boolean}
      additionalProperties: true

    FormField:
      type: object
      description: |
        One field of a plugin's `action_form`. The React frontend renders
        a typed input based on `component`; `options` populates choice
        widgets (Selector, Radio).
      properties:
        display_name: {type: string}
        component:
          type: string
          description: "Widget kind (e.g. String, Number, Text, Selector, Radio, Password)."
        description: {type: string}
        required: {type: boolean}
        default_value: {}
        group:
          type: string
          description: |
            Logical section the field belongs to (e.g. "general" or
            "notification" for settings). Used by the frontend to render
            grouped pickers; ignored by the server.
        options:
          type: array
          items:
            type: object
            properties:
              text: {type: string}
              value: {}
      additionalProperties: true

    StatsResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/StatsData'
        meta:
          $ref: '#/components/schemas/StatsMeta'

    StatsData:
      type: object
      required: [series, totals, snapshot, weekday]
      properties:
        series:
          type: array
          items:
            $ref: '#/components/schemas/SeriesBucket'
        totals:
          $ref: '#/components/schemas/StatsTotals'
        snapshot:
          $ref: '#/components/schemas/StatsSnapshot'
        weekday:
          type: object
          description: "Alert counts keyed by weekday (\"0\" = Sunday … \"6\" = Saturday)."
          additionalProperties: {type: integer}

    SeriesBucket:
      type: object
      required: [t, counts]
      properties:
        t:
          type: string
          format: date-time
          description: "Bucket start timestamp (RFC3339)."
        counts:
          type: object
          description: "Per-series alert counts for this bucket."
          additionalProperties: {type: integer}

    StatsTotals:
      type: object
      required:
        - by_severity
        - by_environment
        - by_host
        - by_action_success
        - by_action_failure
        - by_throttled
        - by_snoozed
        - by_notification
      properties:
        by_severity:
          type: object
          additionalProperties: {type: integer}
        by_environment:
          type: object
          additionalProperties: {type: integer}
        by_host:
          type: object
          description: "Top-10 hosts by alert count."
          additionalProperties: {type: integer}
        by_action_success:
          type: object
          additionalProperties: {type: integer}
        by_action_failure:
          type: object
          additionalProperties: {type: integer}
        by_throttled:
          type: object
          additionalProperties: {type: integer}
        by_snoozed:
          type: object
          additionalProperties: {type: integer}
        by_notification:
          type: object
          additionalProperties: {type: integer}

    StatsSnapshot:
      type: object
      required: [by_state, total_hits, open, ack, closed]
      properties:
        by_state:
          type: object
          description: "Alert counts keyed by state string."
          additionalProperties: {type: integer}
        total_hits:
          type: integer
          description: "Total alert hits in the requested window."
        open:
          type: integer
          description: "Count of records currently in the open state."
        ack:
          type: integer
          description: "Count of records currently in the ack state."
        closed:
          type: integer
          description: "Count of records currently in the close state."

    StatsMeta:
      type: object
      required: [from, to, bucket]
      properties:
        from:
          type: string
          format: date-time
          description: "Actual window start used by the server (RFC3339)."
        to:
          type: string
          format: date-time
          description: "Actual window end used by the server (RFC3339)."
        bucket:
          type: integer
          description: "Series bucket size in seconds."

    AdminCredential:
      type: object
      required: [username, password, method, created]
      description: |
        Provisioned local-admin credential. The `password` is shown exactly
        once (it is not stored in plaintext); save it immediately.
      properties:
        username:
          type: string
          description: "Login username of the provisioned admin."
        password:
          type: string
          description: "Plaintext password shown once. Store it securely."
        method:
          type: string
          description: "Authentication method used (always 'local' for provisioned admins)."
        created:
          type: boolean
          description: "True if the user was newly created; false if the password was reset on an existing user."

    TenantCreateResponse:
      type: object
      required: [added]
      description: "Response body for POST /api/v1/tenant."
      properties:
        added:
          type: array
          items: {type: string}
          description: "List of created tenant id(s)."
        admin:
          $ref: '#/components/schemas/AdminCredential'
          description: "Present only when a first admin was provisioned (create_admin was not false)."

    TenantCreate:
      type: object
      required: [id, display_name]
      description: "Request body for POST /api/v1/tenant."
      properties:
        id:
          type: string
          pattern: '^[a-z0-9][a-z0-9_-]{0,62}[a-z0-9]$'
          description: "Immutable slug. Must be unique. Reserved value `default` is rejected."
        display_name:
          type: string
          description: "Human-readable label."
        status:
          type: string
          enum: [active, suspended]
          default: active
        ingest_token:
          type: string
          description: |
            Per-tenant ingest token. If omitted the server generates a random
            24-byte hex token and returns it in the response body. Store it:
            this is the only time the plaintext is returned.
        create_admin:
          type: boolean
          description: "Provision a first local admin (default true). Set false for LDAP/SSO-only tenants."
        admin_username:
          type: string
          description: "Username for the first admin (default \"admin\")."

    TenantUpdate:
      type: object
      description: "Request body for PATCH /api/v1/tenant/{id}. All fields optional."
      properties:
        display_name:
          type: string
          description: "New human-readable label."
        status:
          type: string
          enum: [active, suspended]
          description: "Change the lifecycle state."
        ingest_token:
          type: string
          description: |
            Rotate the ingest token. Supply a new value or an empty string to
            disable unauthenticated ingestion for this tenant. The server does
            NOT auto-generate a new token on update — supply one explicitly.
