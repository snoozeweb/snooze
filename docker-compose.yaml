# docker-compose stack for local development of the Snooze Go rewrite.
#
# Three database backends are exposed as Compose profiles. Exactly one
# profile should be active per ``docker compose up`` invocation:
#
#   docker compose --profile mongo    up   # default 3-node Mongo RS
#   docker compose --profile postgres up   # single Postgres instance
#   docker compose --profile sqlite   up   # SQLite on a named volume
#
# The ``lb`` nginx load balancer is in the ``mongo`` profile because it
# fronts the three mongo-backed snooze replicas; the postgres / sqlite
# profiles publish snooze-server directly on a host port.

services:

  # ---------- Mongo profile (default, 3-node replica set) ----------

  lb:
    image: nginx
    profiles: [mongo]
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    networks:
      - snoozenw

  snooze1:
    image: snoozeweb/snooze:latest
    profiles: [mongo]
    environment:
      - DATABASE_URL=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/snooze?replicaSet=rs0
      - SNOOZE_CLUSTER=snooze1:5200,snooze2:5200,snooze3:5200
    ports:
      - "5201:5200"
    networks:
      - snoozenw
    depends_on:
      - mongo1

  snooze2:
    image: snoozeweb/snooze:latest
    profiles: [mongo]
    environment:
      - DATABASE_URL=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/snooze?replicaSet=rs0
      - SNOOZE_CLUSTER=snooze1:5200,snooze2:5200,snooze3:5200
    ports:
      - "5202:5200"
    networks:
      - snoozenw
    depends_on:
      - mongo1

  snooze3:
    image: snoozeweb/snooze:latest
    profiles: [mongo]
    environment:
      - DATABASE_URL=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/snooze?replicaSet=rs0
      - SNOOZE_CLUSTER=snooze1:5200,snooze2:5200,snooze3:5200
    ports:
      - "5203:5200"
    networks:
      - snoozenw
    depends_on:
      - mongo1

  mongo1:
    image: mongo
    profiles: [mongo]
    networks:
      - snoozenw
    command: ["--replSet", "rs0"]

  mongo2:
    image: mongo
    profiles: [mongo]
    networks:
      - snoozenw
    command: ["--replSet", "rs0"]

  mongo3:
    image: mongo
    profiles: [mongo]
    networks:
      - snoozenw
    command: ["--replSet", "rs0"]

  # ---------- Postgres profile (single instance) ----------

  postgres:
    image: postgres:16-alpine
    profiles: [postgres]
    environment:
      POSTGRES_DB: snooze
      POSTGRES_USER: snooze
      POSTGRES_PASSWORD: snooze
    networks:
      - snoozenw
    volumes:
      - postgres-data:/var/lib/postgresql/data

  snooze-pg:
    image: snoozeweb/snooze:latest
    profiles: [postgres]
    environment:
      - DATABASE_URL=postgresql://snooze:snooze@postgres:5432/snooze
    ports:
      - "5210:5200"
    networks:
      - snoozenw
    depends_on:
      - postgres

  # ---------- SQLite profile (single embedded server) ----------
  #
  # SQLite is single-writer so there is exactly one snooze-server
  # replica. The on-disk database lives on the ``sqlite-data`` named
  # volume mounted at /var/lib/snooze, matching the Helm StatefulSet
  # layout.
  snooze-sqlite:
    image: snoozeweb/snooze:latest
    profiles: [sqlite]
    environment:
      # Env overrides need the SNOOZE_SERVER_ prefix + dotted struct path, or the
      # loader ignores them. `file` is the legacy alias for the SQLite backend.
      - SNOOZE_SERVER_CORE_DATABASE_TYPE=file
      - SNOOZE_SERVER_CORE_DATABASE_PATH=/var/lib/snooze/db.sqlite
    ports:
      - "5220:5200"
    networks:
      - snoozenw
    volumes:
      - sqlite-data:/var/lib/snooze

networks:
  snoozenw:

volumes:
  postgres-data:
  sqlite-data:
