<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <!-- Mirrors --bg-canvas from src/styles/theme.dark.css (#0a0c0e). The
         inline script below rewrites it to the light value (#f4f5f7, see
         theme.light.css) when the stored theme is light; useTheme keeps it
         in sync on toggle. Meta tags cannot read CSS vars, hence the literal. -->
    <meta name="theme-color" content="#0a0c0e" />
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
    <script>
      // Apply the saved theme before paint to avoid flash-of-wrong-theme.
      // Reads localStorage["snooze.theme"]; falls back to "dark".
      // Only "light" or "dark" are accepted; anything else is treated as
      // the default. Keep this script tiny — it runs synchronously on
      // every page load.
      (function () {
        try {
          var saved = localStorage.getItem("snooze.theme");
          var theme = saved === "light" || saved === "dark" ? saved : "dark";
          document.documentElement.dataset.theme = theme;
          if (theme === "light") {
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute("content", "#f4f5f7");
          }
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <title>Snooze</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
