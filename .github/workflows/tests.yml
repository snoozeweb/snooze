# vim:set ts=2 sw=2 sts=2 et:
---
name: Tests

on:
  pull_request:
    branches: [master, release*]

jobs:
  pytest:
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu-latest runners ship Docker, which the
    # ``pg_dsn`` testcontainers fixture uses to spin up a real
    # postgres:16-alpine for the Postgres-parametrised tests. Nothing
    # extra needs to be installed here.
    steps:
      - name: Checking out git repository
        uses: actions/checkout@v4

      - name: Setup python environment
        uses: ./.github/actions/python-uv
        with: {groups: 'test'}

      - name: Running Pytest
        run: uv run pytest
