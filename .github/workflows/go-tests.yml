name: Go tests
on:
  pull_request:
    branches: [master, "release*"]
  push:
    branches: [master, "release*"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Unit tests
        run: go test -race -shuffle=on -count=1 -coverprofile=cover.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: cover.out
        continue-on-error: true
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Cross-compile every binary
        run: |
          export CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
          go build -trimpath -tags 'osusergo,netgo' ./...
