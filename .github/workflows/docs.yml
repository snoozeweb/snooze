name: docs

# Build the Docusaurus documentation site on every PR that touches it, and
# deploy to GitHub Pages on push to master. Requires the repo's Pages source
# to be set to "GitHub Actions" (Settings → Pages).

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'api/openapi.yaml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'api/openapi.yaml'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    # Publish only from master; PRs run the build job above as a check.
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
