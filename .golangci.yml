version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - misspell
    - revive
    - copyloopvar
    - usestdlibvars
  exclusions:
    rules:
      - path: _test\.go
        linters: [gosec, errcheck]
formatters:
  enable:
    - gofmt
    - goimports
